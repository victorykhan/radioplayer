<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RadioPlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .player { text-align: center; }
    .player h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.1em; color: #e6a817; margin-bottom: 2rem; }
    .now-playing { background: #1a1a1a; border-radius: 12px; padding: 2rem; min-width: 360px; }
    .now-playing .title { font-size: 1.5rem; font-weight: 600; }
    .now-playing .artist { font-size: 1rem; color: #888; margin-top: 0.5rem; }
    .now-playing .meta { font-size: 0.8rem; color: #666; margin-top: 1rem; }
    .status { margin-top: 1rem; font-size: 0.85rem; color: #4ade80; }
  </style>
</head>
<body>
  <div class="player">
    <h1>RadioPlay</h1>
    <div class="now-playing" id="player">
      <div class="title" id="title">Loading...</div>
      <div class="artist" id="artist"></div>
      <div class="meta" id="meta"></div>
    </div>
    <div class="status" id="status">● Connected</div>
  </div>
  <script>
    async function updateNowPlaying() {
      try {
        const r = await fetch('/api/now-playing');
        const d = await r.json();
        document.getElementById('title').textContent = d.title || 'No track playing';
        document.getElementById('artist').textContent = d.artist || '';
        document.getElementById('meta').textContent = d.startedAt
          ? 'Started at ' + new Date(d.startedAt).toLocaleTimeString()
          : '';
      } catch { document.getElementById('status').textContent = '● Offline'; }
    }
    updateNowPlaying();
    setInterval(updateNowPlaying, 5000);
  </script>
</body>
</html>
